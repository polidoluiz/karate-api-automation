name: CI - Karate POC

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  ENV: dev

jobs:

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Container
        run: docker compose up -d --build

      - name: Run Tests
        run: docker compose run --rm karate mvn clean test -Dkarate.env=${ENV}

      - name: Upload target
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target

      - name: Cleanup
        if: always()
        run: docker compose down -v


  report:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download Target
        uses: actions/download-artifact@v4
        with:
          name: target
          path: target

      - name: Generate Report
        run: docker compose run --rm karate mvn allure:report

      - name: Rename report to index.html
        run: |
          mv target/site/allure-maven-plugin/allure-maven.html target/site/allure-maven-plugin/index.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin


  deploy:
    runs-on: ubuntu-latest
    needs: report
    permissions:
      contents: write

    steps:
      - name: Download Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: gh-pages

    
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages

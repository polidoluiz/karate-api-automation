name: CI - Karate POC

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

env:
  ENV: dev

jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
  
    - name: Start Container
      run: |
        docker compose up -d --build

    - name: Tests
      run: docker compose run --rm karate mvn clean test -Dkarate.env=${ENV}

    - name: Report
      run: docker compose run --rm karate mvn allure:report

    - name: Upload Karate Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: karate-report
        path: |
          target/site/allure-maven-plugin 

    - name: Prepare GitHub Pages Folder
      run: |
        mkdir -p gh-pages
        cp -r target/site/allure-maven-plugin/* gh-pages/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gh-pages

    - name: Cleanup
      if: always()
      run: docker compose down -v

services:
  serverest:
    image: paulogoncalvesbh/serverest
    container_name: serverest
    ports:
      - "3000:3000"
  
  karate:
    image: maven:3.9.9-eclipse-temurin-17
    container_name: karate-tests
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - serverest
    environment:
       - KARATE_ENV=${ENV}

  allure_report:
    image: frankescobar/allure-docker-service
    container_name: allure_report
    ports:
      - "5050:5050"
    volumes:
      - ./target/allure-results:/app/allure-results